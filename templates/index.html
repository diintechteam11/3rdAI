<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Analytics | Advanced Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-gradient-mesh {
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-color: #020617;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-hover:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }
        .progress-bar-fill {
            transition: width 0.3s ease-in-out;
        }
        @keyframes subtle-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .float { animation: subtle-float 4s ease-in-out infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-mesh min-h-screen flex flex-col items-center p-4 md:p-8 text-slate-200">

    <!-- Header Section -->
    <header class="w-full max-w-6xl mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
                AI Traffic Analytics
            </h1>
            <p class="text-slate-400 mt-2">Professional Detection Engine v1.2</p>
        </div>
        <div class="flex gap-4">
            <span class="glass px-4 py-2 rounded-full text-xs font-medium text-emerald-400 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                System Ready
            </span>
        </div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Sidebar -->
        <div class="lg:col-span-1 space-y-6">
            <div id="uploadCard" class="glass rounded-3xl p-6 card-hover transition-all">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-white">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Analyze Offline Video
                </h2>
                <form id="uploadForm" class="space-y-6">
                    <div class="relative group">
                        <input type="file" id="videoInput" accept="video/mp4" class="hidden" required>
                        <label for="videoInput" class="flex flex-col items-center justify-center border-2 border-dashed border-slate-700 hover:border-indigo-500 rounded-2xl p-8 cursor-pointer transition-all bg-slate-900/40">
                            <span id="fileName" class="text-sm text-slate-400">Select MP4 video</span>
                        </label>
                    </div>
                    <div class="space-y-3">
                        <label class="text-sm font-medium text-slate-300">Detections</label>
                        <div class="grid grid-cols-1 gap-2">
                            <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer border border-transparent">
                                <input type="checkbox" name="trigger" value="Number Plate Detection" checked class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-indigo-600">
                                <span class="text-sm text-slate-300">Number Plate (ANPR)</span>
                            </label>
                        </div>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold transition-all flex items-center justify-center gap-3">
                        <span id="btnText">Run Analysis</span>
                        <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                    </button>
                </form>
                <div id="processingSection" class="hidden mt-6 space-y-4">
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-indigo-400 font-medium" id="statusText">Processing...</span>
                        <span id="progressPercent" class="text-slate-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                        <div id="progressBar" class="bg-indigo-500 h-full w-0 progress-bar-fill"></div>
                    </div>
                </div>
            </div>

            <div id="cameraCard" class="glass rounded-3xl p-6 card-hover transition-all">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-white">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Live Camera
                </h2>
                <form id="cameraForm" class="space-y-4">
                    <input type="text" id="camName" placeholder="Camera Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm" required>
                    <input type="text" id="camLink" placeholder="RTSP/IP Link" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm" required>
                    <button type="submit" id="connectBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold transition-all">Connect</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="lg:col-span-2 space-y-8">
            <div id="activeCameras" class="space-y-8"></div>

            <div id="resultCard" class="glass rounded-3xl overflow-hidden hidden">
                <div class="aspect-video bg-black relative">
                    <video id="outputVideo" controls class="w-full h-full object-contain"></video>
                </div>
            </div>

            <div class="glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-white">Analyze Feed Output</h2>
                </div>
                <div class="overflow-x-auto min-h-[200px]">
                    <div class="max-h-[500px] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left text-xs uppercase tracking-tight">
                            <thead class="sticky top-0 bg-[#020617] text-slate-500 font-bold border-b border-white/5">
                                <tr>
                                    <th class="py-3 px-4">Time</th>
                                    <th class="py-3 px-4">Trigger</th>
                                    <th class="py-3 px-4">Crop</th>
                                    <th class="py-3 px-4">R2 Cloud</th>
                                    <th class="py-3 px-4 text-right">Result</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-white/5">
                                <tr><td colspan="5" class="py-20 text-center text-slate-600 italic">Analysis results will appear here</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="imageModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4 backdrop-blur-sm" onclick="this.classList.add('hidden')">
        <img id="modalImage" class="max-w-full max-h-full rounded-xl shadow-2xl border border-white/10">
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const fileName = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const progressPercent = document.getElementById('progressPercent');
        const outputVideo = document.getElementById('outputVideo');
        const resultCard = document.getElementById('resultCard');
        const logTableBody = document.getElementById('logTableBody');

        videoInput.onchange = () => { if(videoInput.files[0]) fileName.innerText = videoInput.files[0].name };

        uploadForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('video_file', videoInput.files[0]);
            formData.append('triggers', 'Number Plate Detection');

            submitBtn.disabled = true;
            document.getElementById('processingSection').classList.remove('hidden');
            
            try {
                const res = await fetch('/upload-video', { method: 'POST', body: formData });
                const data = await res.json();
                pollVideo(data.task_id);
            } catch(e) { alert("Upload error"); submitBtn.disabled = false; }
        };

        function pollVideo(taskId) {
            const intv = setInterval(async () => {
                const res = await fetch(`/video-result/${taskId}`);
                const data = await res.json();
                if(data.status === 'processing') {
                    let p = parseInt(progressBar.style.width) || 10;
                    if(p < 95) { p += 5; progressBar.style.width = p+'%'; progressPercent.innerText = p+'%'; }
                } else if(data.status === 'completed') {
                    clearInterval(intv);
                    renderLogTable(data.logs);
                    outputVideo.src = data.video_url;
                    resultCard.classList.remove('hidden');
                    submitBtn.disabled = false;
                    progressBar.style.width = '100%'; progressPercent.innerText = '100%';
                    statusText.innerText = "Complete!";
                }
            }, 3000);
        }

        function renderLogTable(logs) {
            logTableBody.innerHTML = '';
            const seen = new Set();
            logs.forEach(log => {
                const plate = log.plate_number;
                if(plate && plate !== 'Scanning' && seen.has(plate)) return;
                if(plate && plate !== 'Scanning') seen.add(plate);

                const row = document.createElement('tr');
                row.className = "hover:bg-white/5 border-b border-white/5 transition-colors";
                const isR2 = log.saved_to_r2 === true;
                row.innerHTML = `
                    <td class="py-4 px-4 text-slate-500 font-mono">${log.timestamp}s</td>
                    <td class="py-4 px-4"><span class="px-2 py-0.5 bg-indigo-500/10 text-indigo-400 rounded-md border border-indigo-500/20">${log.trigger}</span></td>
                    <td class="py-4 px-4">${log.image_plate ? `<img src="${log.image_plate}" class="h-10 rounded border border-white/10 cursor-pointer hover:scale-150 transition-transform" onclick="event.stopPropagation(); showModal('${log.image_plate}')">` : '-'}</td>
                    <td class="py-4 px-4">${isR2 ? '<span class="text-emerald-400 flex items-center gap-1 font-bold">✓ Saved</span>' : '<span class="text-slate-500">Local</span>'}</td>
                    <td class="py-4 px-4 text-right font-bold text-white text-lg">${plate || log.event}</td>
                `;
                logTableBody.appendChild(row);
            });
        }

        function showModal(src) { document.getElementById('modalImage').src = src; document.getElementById('imageModal').classList.remove('hidden'); }

        // Live Camera
        const cameraForm = document.getElementById('cameraForm');
        cameraForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('camName').value);
            formData.append('link', document.getElementById('camLink').value);
            formData.append('triggers', 'Number Plate Detection');
            const res = await fetch('/connect-camera', { method: 'POST', body: formData });
            const data = await res.json();
            initLiveCam(data.camera_id, document.getElementById('camName').value);
        };

        function initLiveCam(id, name) {
            const div = document.createElement('div');
            div.className = "glass rounded-3xl overflow-hidden animation-in zoom-in";
            div.innerHTML = `
                <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <h3 class="font-bold text-white">${name}</h3>
                    <span id="status-${id}" class="text-[10px] text-amber-500 animate-pulse font-bold tracking-widest">INITIALIZING...</span>
                </div>
                <div class="grid lg:grid-cols-2">
                    <canvas id="canvas-${id}" class="w-full aspect-video bg-black"></canvas>
                    <div id="live-logs-${id}" class="p-6 h-[250px] overflow-y-auto custom-scrollbar text-[11px] space-y-2"></div>
                </div>
            `;
            document.getElementById('activeCameras').prepend(div);
            
            const check = setInterval(async () => {
                const r = await fetch(`/camera-status/${id}`);
                const d = await r.json();
                if(d.status === 'connected') {
                    clearInterval(check);
                    document.getElementById(`status-${id}`).innerText = "LIVE";
                    document.getElementById(`status-${id}`).className = "text-[10px] text-emerald-400 font-bold tracking-widest";
                    startWS(id);
                    setInterval(() => pollLiveLogs(id), 1000);
                }
            }, 2000);
        }

        function startWS(id) {
            const ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws-camera/'+id);
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            const img = new Image();
            ws.onmessage = (e) => { 
                const url = URL.createObjectURL(new Blob([e.data], {type:'image/jpeg'}));
                img.onload = () => { canvas.width=img.width; canvas.height=img.height; ctx.drawImage(img,0,0); URL.revokeObjectURL(url); };
                img.src = url;
            };
        }

        async function pollLiveLogs(id) {
            const r = await fetch(`/camera-logs/${id}`);
            const d = await r.json();
            const container = document.getElementById(`live-logs-${id}`);
            if(d.logs.length === container.childElementCount) return;
            container.innerHTML = '';
            d.logs.reverse().forEach(log => {
                const el = document.createElement('div');
                el.className = "flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/5";
                el.innerHTML = `<span>${log.timestamp}</span> <span class="font-bold text-indigo-400">${log.plate_number || 'Detection'}</span>`;
                container.appendChild(el);
            });
        }
    </script>
</body>
</html>
