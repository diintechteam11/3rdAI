<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rdAI | Command Dashboard v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.75); --indigo: #6366f1; --emerald: #10b981; --rose: #f43f5e; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #f1f5f9; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'Fira Code', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .recording-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.02); } }
        .log-item { animation: slide-in 0.3s ease-out; }
        @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .btn-ready { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; } 
        .btn-ready:active { transform: scale(0.9); }
        .btn-ready:disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col h-screen overflow-hidden">

    <!-- Top Navbar -->
    <header class="h-16 glass flex items-center justify-between px-8 z-50 border-b border-white/5 bg-slate-950/40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/30">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2.5"></path></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight uppercase">3rdAI <span class="text-indigo-400">Command</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="px-4 py-1 bg-emerald-500/10 text-emerald-500 rounded-full border border-emerald-500/20 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                 <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Service Operational
            </div>
            <button onclick="toggleModal('camModal')" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full text-xs font-bold tracking-widest transition-all shadow-lg active:scale-95">Register Stream</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Recorded Archives (Left) -->
        <aside class="w-80 glass border-r border-white/5 flex flex-col side-panel">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Library cache</h2>
                <span id="archiveStats" class="text-[9px] text-indigo-400 font-bold bg-indigo-400/10 px-2 py-0.5 rounded uppercase">0 Files</span>
            </div>
            <div id="recordingList" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                <!-- Recording items injected here -->
            </div>
        </aside>

        <!-- Main Stream Grid (Center) -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-950/20">
            <div class="h-14 glass flex items-center justify-between px-6 border-b border-white/5 bg-indigo-600/5">
                <div class="flex gap-8">
                    <button onclick="filterMode('all')" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-all view-filter active" data-mode="all">All Channels</button>
                    <button onclick="filterMode('active')" class="text-[10px] font-bold uppercase tracking-widest text-emerald-400 hover:text-white transition-all view-filter" data-mode="active">Active Streams</button>
                </div>
            </div>
            
            <div id="streamGrid" class="flex-1 overflow-y-auto p-8 space-y-12 custom-scrollbar">
                <div id="welcomeMsg" class="h-full flex flex-col items-center justify-center opacity-30 mt-20">
                    <svg class="w-24 h-24 text-slate-700 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"></path></svg>
                    <h4 class="text-2xl font-bold uppercase tracking-[0.3em] text-slate-700">Digital Horizon Empty</h4>
                    <p class="text-xs font-bold text-slate-600 mt-2 uppercase tracking-widest">Awaiting RTSP Handshake Protocols</p>
                </div>
            </div>
        </main>

        <!-- Neural Output Sidebar (Right) -->
        <aside class="w-[480px] glass border-l border-white/5 flex flex-col">
            <div class="p-6 border-b border-white/5 bg-emerald-600/5 flex justify-between items-center">
                 <h2 class="text-[10px] font-bold text-white uppercase tracking-widest">Neural violation feed</h2>
                 <button onclick="document.getElementById('analysisFeed').innerHTML=''" class="text-[9px] text-rose-400 font-bold hover:text-rose-300">CLEAR CACHE</button>
            </div>
            <div id="analysisFeed" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                <div class="h-full flex items-center justify-center italic text-xs text-slate-700 uppercase tracking-widest">Silent Analysis Mode Active...</div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="camModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md">
        <div class="glass max-w-lg w-full rounded-[2.5rem] p-10 border-white/10 shadow-2xl relative">
            <button onclick="toggleModal('camModal')" class="absolute top-8 right-10 text-slate-500 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5"></path></svg></button>
            <h2 class="text-3xl font-bold mb-10 tracking-tighter">New Channel Entry</h2>
            <form id="connectForm" class="space-y-6">
                <input type="text" id="camName" placeholder="Ident Name (e.g. Loading Area 01)" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl px-6 py-4 focus:border-indigo-600 focus:outline-none transition-all placeholder:text-slate-700" required>
                <input type="text" id="camUrl" placeholder="RTSP://admin:password@ip_address:port" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl px-6 py-4 focus:border-indigo-600 focus:outline-none transition-all placeholder:text-slate-700" required>
                <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 active:scale-95 transition-all">Establish Channel Connection</button>
            </form>
        </div>
    </div>

    <div id="startRecModal" class="hidden fixed inset-0 z-[101] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass max-w-md w-full rounded-[2.5rem] p-10 border-white/10 shadow-2xl relative">
            <h2 class="text-2xl font-bold mb-2 tracking-tighter">Initialize Capture</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-10">Configure neural triggers and metadata</p>
            <form id="recStartForm" class="space-y-8">
                <input type="text" id="videoTitle" placeholder="Video Session Title" class="w-full bg-slate-950 border border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-600 transition-all font-bold text-sm" required>
                <div class="space-y-4">
                     <label class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Trigger Synthesis Models</label>
                     <div class="grid grid-cols-1 gap-2">
                          <label class="flex items-center gap-4 p-5 rounded-2xl bg-white/5 border border-white/5 cursor-pointer hover:bg-white/10">
                              <input type="checkbox" name="trig" value="Number Plate Detection" checked class="w-5 h-5 text-indigo-600 rounded">
                              <span class="text-sm font-bold">Number Plate Analysis</span>
                          </label>
                          <label class="flex items-center gap-4 p-5 rounded-2xl bg-white/5 border border-white/5 cursor-pointer hover:bg-white/10">
                              <input type="checkbox" name="trig" value="Helmet Detection" class="w-5 h-5 text-indigo-600 rounded">
                              <span class="text-sm font-bold">PPE / Helmet Compliance</span>
                          </label>
                     </div>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="toggleModal('startRecModal')" class="flex-1 py-4 bg-slate-900 text-slate-500 font-bold rounded-2xl">Abort</button>
                    <button type="submit" class="flex-1 py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-600/20 active:scale-95">Begin Processing</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imgModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-8 bg-black/95 backdrop-blur-xl" onclick="this.classList.add('hidden')">
        <img id="modalImg" class="max-w-full max-h-full rounded-2xl border-2 border-white/5" />
    </div>

    <!-- Script Entry -->
    <script>
        let cams = {}; let activeRecs = {}; let seenLog = new Set(); let targetId = null;
        let wsStream = {}; let wsLogs = {};

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        const connectForm = document.getElementById('connectForm');
        connectForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = connectForm.querySelector('button'); btn.disabled = true; btn.innerText = "Synchronizing RTSP...";
            const fd = new FormData(); fd.append('name', document.getElementById('camName').value); fd.append('link', document.getElementById('camUrl').value);
            try {
                await fetch('/connect-camera', { method: 'POST', body: fd });
                loadCameras(); toggleModal('camModal');
            } catch(e) { alert(e.message); } finally { btn.disabled = false; btn.innerText = "Connect Device"; }
        }

        async function loadCameras() {
            const r = await fetch('/api/v1/cameras');
            const d = await r.json();
            const grid = document.getElementById('streamGrid');
            if(d.cameras.length) document.getElementById('welcomeMsg').classList.add('hidden');
            
            // Clean removed cameras
            document.querySelectorAll('.stream-card').forEach(c => {
                if(!d.cameras.find(db_c => `card-${db_c.id}` === c.id)) c.remove();
            });

            d.cameras.forEach(c => {
                cams[c.id] = c;
                if(!document.getElementById(`card-${c.id}`)) {
                    const card = document.createElement('div');
                    card.id = `card-${c.id}`;
                    card.className = "stream-card glass rounded-[2.5rem] overflow-hidden border-2 border-white/5 animation-in zoom-in duration-500";
                    card.innerHTML = `
                        <div class="px-8 py-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 bg-white/5">
                            <div class="flex items-center gap-4">
                                <span id="dot-${c.id}" class="w-3 h-3 bg-slate-700 rounded-full shadow-lg transition-all"></span>
                                <div>
                                    <h4 class="text-lg font-bold text-white tracking-tight">${c.name}</h4>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">${c.ip}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="toggleConnection('${c.id}')" id="conn-btn-${c.id}" class="px-5 py-2.5 bg-white/5 hover:bg-white/10 text-xs font-bold rounded-2xl transition-all border border-white/5">Connect</button>
                                <button onclick="deletePermanently('${c.id}')" class="p-3 bg-rose-600/10 text-rose-400 hover:bg-rose-600 hover:text-white rounded-2xl transition-all border border-rose-600/20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2.5"></path></svg></button>
                            </div>
                        </div>
                        <div class="aspect-video bg-black relative flex flex-col items-center justify-center">
                            <canvas id="canvas-${c.id}" class="hidden w-full h-full object-contain"></canvas>
                            <div id="offline-${c.id}" class="text-center">
                                <svg class="w-12 h-12 text-slate-800 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18.364 5.636l-1.414 1.414m-1.414 1.414L12 12m0 0l-3.536 3.536m3.536-3.536L15.536 8.464M5.636 18.364l1.414-1.414m1.414-1.414L12 12" stroke-width="2"></path></svg>
                                <p class="text-[10px] font-bold text-slate-700 uppercase tracking-widest">Feed Offline / Standby</p>
                            </div>
                            <div id="controls-${c.id}" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-3 p-2 glass rounded-2xl border-white/10">
                                <button onclick="startRecording('${c.id}')" id="btn-start-${c.id}" class="btn-ready px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-emerald-600/20">START REC</button>
                                <button onclick="stopRecording('${c.id}')" id="btn-stop-${c.id}" class="hidden btn-ready px-6 py-2.5 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-rose-600/20">STOP REC</button>
                                <button onclick="toggleAutoAI('${c.id}')" id="btn-auto-${c.id}" class="btn-ready px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-indigo-600/20">AUTO AI</button>
                            </div>
                            <div id="rec-label-${c.id}" class="hidden absolute top-8 right-8 flex items-center gap-3 bg-rose-600/20 border border-rose-500/40 px-6 py-3 rounded-full recording-pulse">
                                 <span class="w-2.5 h-2.5 bg-rose-500 rounded-full"></span>
                                 <span class="text-[10px] font-bold text-white uppercase tracking-[0.2em] mono" id="clock-${c.id}">00:00</span>
                            </div>
                        </div>
                    `;
                    grid.prepend(card);
                }
                updateCardVisuals(c.id, c.status);
            });
        }

        function updateCardVisuals(id, status) {
            const dot = document.getElementById(`dot-${id}`);
            const btn = document.getElementById(`conn-btn-${id}`);
            const offline = document.getElementById(`offline-${id}`);
            const canvas = document.getElementById(`canvas-${id}`);
            const ctrl = document.getElementById(`controls-${id}`);

            if(status === 'active' || status === 'recording') {
                dot.className = "w-3 h-3 bg-emerald-500 rounded-full shadow-lg shadow-emerald-500/50";
                btn.innerText = "Disconnect"; btn.className = "px-5 py-2.5 bg-rose-600/10 text-rose-500 hover:bg-rose-600 hover:text-white text-xs font-bold rounded-2xl transition-all border border-rose-600/20";
                offline.classList.add('hidden'); canvas.classList.remove('hidden');
                ctrl.classList.remove('hidden');
                if(!wsStream[id]) initStreams(id);
            } else {
                dot.className = "w-3 h-3 bg-slate-700 rounded-full shadow-lg";
                btn.innerText = "Connect"; btn.className = "px-5 py-2.5 bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white text-xs font-bold rounded-2xl transition-all border border-emerald-500/20";
                offline.classList.remove('hidden'); canvas.classList.add('hidden');
                ctrl.classList.add('hidden');
                if(wsStream[id]) { wsStream[id].close(); delete wsStream[id]; }
                if(wsLogs[id]) { wsLogs[id].close(); delete wsLogs[id]; }
            }
        }

        async function toggleConnection(id) {
            const mode = cams[id].status === 'inactive' ? 'connect-camera' : 'disconnect-camera/'+id;
            const fd = new FormData(); if(mode==='connect-camera') { fd.append('name', cams[id].name); fd.append('link', cams[id].ip); }
            await fetch('/'+mode, { method: 'POST', body: fd });
            loadCameras();
        }

        async function deletePermanently(id) {
            if(confirm("Permanently erase this stream and history?")) {
                await fetch(`/api/v1/cameras/${id}`, { method: 'DELETE' });
                loadCameras();
            }
        }

        function initStreams(id) {
            const stream = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws-camera/'+id);
            const cvs = document.getElementById(`canvas-${id}`);
            const ctx = cvs.getContext('2d');
            const img = new Image();
            stream.onmessage = (e) => {
                const u = URL.createObjectURL(new Blob([e.data], {type: 'image/jpeg'}));
                img.onload = () => { cvs.width=img.width; cvs.height=img.height; ctx.drawImage(img,0,0); URL.revokeObjectURL(u); };
                img.src = u;
            };
            wsStream[id] = stream;

            const logs = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws-logs/'+id);
            logs.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if(d.logs) d.logs.forEach(l => renderLog(id, l));
            };
            wsLogs[id] = logs;
        }

        function renderLog(id, l) {
            const feed = document.getElementById('analysisFeed');
            if(feed.querySelector('italic')) feed.innerHTML = '';
            const key = `${id}-${l.plate_number || l.timestamp}`;
            if(seenLog.has(key)) return; seenLog.add(key);

            const card = document.createElement('div');
            card.className = "log-item glass p-5 rounded-3xl border-transparent hover:border-white/10 transition-all border-2";
            card.dataset.cam = id;
            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-bold uppercase tracking-widest bg-indigo-600/10 text-indigo-400 px-3 py-1 rounded-lg">${l.trigger}</span>
                    <span class="text-[9px] font-mono text-slate-700">${l.timestamp}</span>
                </div>
                <div class="flex gap-5">
                    <img src="${l.image_plate}" class="w-32 h-20 bg-slate-950 rounded-2xl object-cover cursor-zoom-in" onclick="zoom('${l.image_plate}')">
                    <div class="flex-1 flex flex-col justify-center">
                        <h5 class="text-indigo-400 font-bold text-lg leading-tight tracking-tighter">${l.plate_number || 'AI TRIGGER'}</h5>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Peripheral: ${cams[id]?.name}</p>
                    </div>
                </div>
            `;
            feed.prepend(card);
        }

        function startRecording(id) { targetId = id; toggleModal('startRecModal'); }
        const recStartForm = document.getElementById('recStartForm');
        recStartForm.onsubmit = async (e) => {
            e.preventDefault();
            const n = document.getElementById('videoTitle').value;
            const tr = Array.from(document.querySelectorAll('input[name="trig"]:checked')).map(c=>c.value);
            const fd = new FormData(); fd.append('initiated_by', 'Operator-01'); fd.append('video_name', n); fd.append('triggers', tr.join(','));
            const r = await fetch(`/api/v1/cameras/${targetId}/recording/start`, { method: 'POST', body: fd });
            if(r.ok) {
                document.getElementById(`btn-start-${targetId}`).classList.add('hidden');
                document.getElementById(`btn-stop-${targetId}`).classList.remove('hidden');
                document.getElementById(`rec-label-${targetId}`).classList.remove('hidden');
                activeRecs[targetId] = { s: Date.now() };
                updateClock(targetId);
                toggleModal('startRecModal');
            }
        }

        async function stopRecording(id) {
            const fd = new FormData(); fd.append('stopped_by', 'Manual Override');
            const r = await fetch(`/api/v1/cameras/${id}/recording/stop`, { method: 'POST', body: fd });
            if(r.ok) {
                document.getElementById(`btn-start-${id}`).classList.remove('hidden');
                document.getElementById(`btn-stop-${id}`).classList.add('hidden');
                document.getElementById(`rec-label-${id}`).classList.add('hidden');
                delete activeRecs[id];
                loadArchives();
            }
        }

        function toggleAutoAI(id) {
             const btn = document.getElementById(`btn-auto-${id}`);
             const isActive = btn.classList.contains('bg-indigo-600');
             btn.className = isActive ? "btn-ready px-6 py-2.5 bg-slate-800 text-slate-500 rounded-xl text-[10px] font-bold uppercase tracking-widest" : "btn-ready px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest";
             btn.innerText = isActive ? "AI OFF" : "AUTO AI";
             // In a real app, this might send an API call to toggle AI processing without recording
        }

        async function loadArchives() {
            const r = await fetch('/api/v1/recordings');
            const d = await r.json();
            const list = document.getElementById('recordingList');
            document.getElementById('archiveStats').innerText = `${d.recordings.length} Files`;
            list.innerHTML = '';
            d.recordings.forEach(rec => {
                const el = document.createElement('div');
                el.className = "glass p-4 rounded-3xl hover:bg-white/5 cursor-pointer border border-transparent hover:border-white/5 transition-all flex flex-col gap-4";
                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="truncate">
                            <p class="text-[11px] font-bold text-white truncate">${rec.video_name}</p>
                            <p class="text-[8px] text-slate-600 font-bold uppercase mt-1">${new Date(rec.started_at).toLocaleString()}</p>
                        </div>
                        <button onclick="deleteSession('${rec.id}'); event.stopPropagation();" class="p-2.5 bg-rose-600/10 text-rose-500 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2.5"></path></svg></button>
                    </div>
                `;
                el.onclick = () => window.open(rec.file_path, '_blank');
                list.appendChild(el);
            });
        }

        async function deleteSession(id) { if(confirm("Purge recording?")) { await fetch(`/api/v1/recordings/${id}`, {method:'DELETE'}); loadArchives(); } }
        function zoom(s) { document.getElementById('modalImg').src=s; toggleModal('imgModal'); }
        function filterMode(m) {
            document.querySelectorAll('.view-filter').forEach(f=>f.classList.remove('active','text-white','text-emerald-400'));
            const cards = document.querySelectorAll('.stream-card');
            cards.forEach(c => {
                const id = c.id.replace('card-','');
                if(m==='all') c.style.display='block';
                else if(m==='active') c.style.display = (cams[id].status==='active'||cams[id].status==='recording') ? 'block':'none';
            })
        }
        function updateClock(id) { if(!activeRecs[id])return; const e = Math.floor((Date.now()-activeRecs[id].s)/1000); const m = Math.floor(e/60).toString().padStart(2,'0'); const s = (e%60).toString().padStart(2,'0'); document.getElementById(`clock-${id}`).innerText=`${m}:${s}`; setTimeout(()=>updateClock(id),1000); }

        window.onload = () => { loadCameras(); loadArchives(); };
    </script>
</body>
</html>
